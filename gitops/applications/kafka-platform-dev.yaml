apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-platform-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Cherry5994/kafka-platform.git
    targetRevision: main
    path: platform/environments/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: kafka-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
   syncOptions:
     -  CreateNamespace=true


